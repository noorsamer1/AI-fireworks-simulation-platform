name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync backend dependencies
        run: uv sync
      - name: Import app module
        env:
          OPENROUTER_API_KEY: sk-ci-dummy
        run: uv run python -c "from pyromind.api.main import app; print(app.title)"

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync backend dependencies
        run: uv sync
      - name: Run pytest
        env:
          OPENROUTER_API_KEY: sk-ci-dummy
        run: uv run pytest tests/ -v

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync backend (for Pydantic models)
        working-directory: backend
        run: uv sync
      - name: Verify generated TypeScript matches Pydantic
        run: uv run --directory backend python "${{ github.workspace }}/scripts/gen_types.py" --check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck and build frontend
        run: pnpm build
